<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spatium | home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --bg-2: #0a0a0a;
            --bg-3: #121212;
            --bg-4: #1a1a1a;
            --border-grey: #2a2a2a;
            --search-border: #1c1c1c;
            --accent: #f365ac;
            --accent-glow: rgba(243, 101, 172, 0.4);
            --text-white: #ffffff;
            --text-bright-grey: #e0e0e0;
            --text-grey: #b0b0b0;
            --nav-width: 75px;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Figtree',sans-serif; }
        
        body {
            background: var(--bg);
            color: var(--text-white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* Particles - FULL SCREEN BACKGROUND */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Sidebar */
        #navbar {
            position: relative;
            z-index: 100;
            width: var(--nav-width);
            height: 100%;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-grey);
            display: flex;
            flex-direction: column;
            padding: 25px 0;
            align-items: center;
        }
        #navbar ul {
            list-style: none;
            width: 100%;
            padding: 0 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            left: -100px;
            transition: left 0.6s cubic-bezier(0.23,1,0.32,1);
        }
        #navbar ul#section3nav { margin-top: auto; }
        #navbar li {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            color: var(--text-grey);
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 auto;
        }
        #navbar li i { font-size: 1.3rem; }
        #navbar li:hover { background: rgba(255,255,255,0.08); color: var(--text-white); }
        #navbar li.active { background: rgba(243,101,172,0.15); color: var(--accent); }

        .tooltip {
            position: absolute;
            left: 70px;
            background: #1a1a1a;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.2s;
            border: 1px solid var(--border-grey);
            z-index: 1000;
        }
        #navbar li:hover .tooltip { opacity: 1; transform: translateX(0); }

        /* Main Content */
        .container {
            flex: 1;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hometitle {
            font-size: 7.5rem;
            font-weight: 900;
            letter-spacing: -6px;
            background: linear-gradient(to bottom, #ffb3d9, #f365ac, #d64d92);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--accent-glow));
            user-select: none;
        }
        #splash {
            font-size: 1.1rem;
            color: var(--text-bright-grey);
            margin: 5px 0 40px;
            letter-spacing: 2px;
        }

        .inputcontainer {
            background: var(--bg-2);
            border: 1px solid var(--search-border);
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 520px;
            transition: all .3s;
        }
        .inputcontainer:focus-within {
            border-color: var(--text-white);
            background: var(--bg-3);
        }
        .inputcontainer input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-white);
            font-size: 1.1rem;
            width: 100%;
        }

        .flex-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .shortcut-home {
            background: var(--bg-2);
            border: 1px solid var(--border-grey);
            padding: 20px;
            border-radius: 12px;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            color: inherit;
            text-decoration: none;
        }
        .shortcut-home:hover {
            background: var(--bg-3);
            border-color: var(--text-white);
            transform: translateY(-4px);
        }
        .shortcut-home i { font-size: 24px; margin-bottom: 10px; }
        .shortcut-home h3 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-bright-grey); }

        /* Proxy Frame */
        #proxy-frame {
            position: fixed;
            inset: 0;
            border: none;
            background: #000;
            z-index: 5;
            display: none;
        }
        #proxy-frame.active { display: block; }

        #online {
            position: absolute;
            bottom: 25px;
            left: calc(50% + 37px);
            transform: translateX(-50%);
            color: var(--text-grey);
            opacity: 0.7;
            font-size: 0.75rem;
            letter-spacing: 1px;
            z-index: 20;
        }

        /* Notice */
        .bluroverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); z-index: 999; }
        .anotice {
            position: fixed;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 1px solid var(--border-grey);
            padding: 40px;
            border-radius: 24px;
            z-index: 1000;
            max-width: 350px;
            text-align: center;
        }
        .anotice h2 { color: var(--accent); margin-bottom: 10px; }
        .anotice button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            margin-top: 25px;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Particles Container - FULL BACKGROUND -->
    <div id="particles-js"></div>

    <!-- Sidebar -->
    <nav id="navbar">
        <ul id="section1nav">
            <li class="active" onclick="switchPage('home')" data-target="home">
                <i class="fa-solid fa-house"></i>
                <div class="tooltip">Home</div>
            </li>
        </ul>
        <ul id="section2nav">
            <li onclick="switchPage('browser')" data-target="browser"><i class="fa-solid fa-globe"></i><div class="tooltip">Browser</div></li>
            <li onclick="switchPage('games')" data-target="games"><i class="fa-solid fa-gamepad"></i><div class="tooltip">Games</div></li>
            <li onclick="switchPage('watch')" data-target="watch"><i class="fa-solid fa-video"></i><div class="tooltip">Movies & TV</div></li>
            <li onclick="switchPage('listen')" data-target="listen"><i class="fa-solid fa-music"></i><div class="tooltip">Music</div></li>
            <li onclick="switchPage('ai')" data-target="ai"><i class="fa-solid fa-wand-magic-sparkles"></i><div class="tooltip">AI</div></li>
        </ul>
        <ul id="section3nav">
            <li onclick="switchPage('profile')" data-target="profile"><i class="fa-solid fa-user-gear"></i><div class="tooltip">Profile</div></li>
            <li onclick="switchPage('settings')" data-target="settings"><i class="fa-solid fa-gear"></i><div class="tooltip">Settings</div></li>
        </ul>
    </nav>

    <!-- Home Content -->
    <div class="container" id="home-view">
        <h1 class="hometitle">Spatium</h1>
        <p id="splash">loading...</p>

        <div class="inputcontainer">
            <i class="fa-solid fa-magnifying-glass" style="color:var(--text-bright-grey);"></i>
            <input type="text" id="search-input" placeholder="Search or enter URL..." autocomplete="off">
        </div>

        <div class="flex-row">
            <a href="#" class="shortcut-home" onclick="quickLoad('https://play.geforcenow.com')"><i class="fa-brands fa-nvidia"></i><h3>GF Now</h3></a>
            <a href="#" class="shortcut-home" onclick="quickLoad('https://youtube.com')"><i class="fa-brands fa-youtube"></i><h3>YouTube</h3></a>
            <a href="#" class="shortcut-home" onclick="quickLoad('https://github.com')"><i class="fa-brands fa-github"></i><h3>Github</h3></a>
            <a href="#" class="shortcut-home" onclick="quickLoad('https://discord.com')"><i class="fa-brands fa-discord"></i><h3>Discord</h3></a>
        </div>
    </div>

    <!-- Scramjet Proxy Frame -->
    <iframe id="proxy-frame" allowfullscreen></iframe>

    <p id="online">ENCRYPTED CONNECTION • 200 OK</p>

    <!-- Notice -->
    <div class="anotice hidden" id="noticeBox">
        <h2>Notice</h2>
        <p>SPATIUM // CHERRI V2 is here!</p>
        <button onclick="closeNotice()">Understood</button>
    </div>

    <script>
        // === Fullscreen Particles ===
        function initParticles() {
            const container = document.getElementById('particles-js');
            const canvas = document.createElement('canvas');
            canvas.style.position = 'absolute';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let width, height, particles = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            function createParticles() {
                particles = [];
                for (let i = 0; i < 80; i++) {
                    const shade = Math.floor(Math.random() * 50) + 40;
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 1.2,
                        vy: (Math.random() - 0.5) * 1.2,
                        radius: Math.random() * 2.5 + 0.8,
                        color: `rgba(${shade}, ${shade}, ${shade}, 0.75)`
                    });
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;

                    // Wrap around edges
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;

                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                resize();
                createParticles();
            });

            resize();
            createParticles();
            animate();
        }

        // === Scramjet Setup (same as before) ===
        let scramjetController;

        async function initScramjet() {
            const script = document.createElement('script');
            script.src = '/scram/scramjet.all.js';
            script.onload = async () => {
                const { ScramjetController } = $scramjetLoadController();
                scramjetController = new ScramjetController({
                    files: {
                        wasm: "/scram/scramjet.wasm.wasm",
                        all: "/scram/scramjet.all.js",
                        sync: "/scram/scramjet.sync.js"
                    }
                });
                await scramjetController.init();
                if ('serviceWorker' in navigator) {
                    await navigator.serviceWorker.register('/sw.js', { scope: '/' });
                }
                console.log('%cScramjet + Particles Ready', 'color:#f365ac;font-weight:bold');
            };
            document.head.appendChild(script);
        }

        function loadProxy(url) {
            if (!scramjetController) return alert("Scramjet is still loading...");
            const encoded = scramjetController.encodeUrl(url);
            const frame = document.getElementById('proxy-frame');
            frame.src = encoded;
            frame.classList.add('active');
            document.getElementById('home-view').style.display = 'none';
        }

        function quickLoad(url) { loadProxy(url); }

        function switchPage(page) {
            document.querySelectorAll('#navbar li').forEach(li => li.classList.remove('active'));
            const activeLi = document.querySelector(`li[data-target="${page}"]`);
            if (activeLi) activeLi.classList.add('active');

            const frame = document.getElementById('proxy-frame');
            const home = document.getElementById('home-view');

            if (page === 'home') {
                frame.classList.remove('active');
                home.style.display = 'flex';
            } else if (page === 'browser') {
                home.style.display = 'none';
                frame.classList.add('active');
            } else {
                alert(`"${page}" page coming soon!`);
            }
        }

        function closeNotice() {
            document.getElementById('noticeBox').classList.add('hidden');
            const overlay = document.querySelector('.bluroverlay');
            if (overlay) overlay.remove();
        }

        // Init everything
        window.onload = () => {
            initParticles();

            const splashes = ["ggs", "error: could not load splash", "best proxy ever?", "7 8", "w o w", "partnered with everyone"];
            document.getElementById('splash').textContent = splashes[Math.floor(Math.random() * splashes.length)];

            initScramjet();

            // Sidebar animation
            ['section1nav','section2nav','section3nav'].forEach((id, i) => {
                setTimeout(() => document.getElementById(id).style.left = '0', 150 + i*120);
            });

            // Search
            document.getElementById('search-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    let val = e.target.value.trim();
                    if (val) {
                        if (!val.startsWith('http')) val = 'https://' + val;
                        loadProxy(val);
                    }
                }
            });

            // Notice
            setTimeout(() => {
                document.getElementById('noticeBox').classList.remove('hidden');
                const overlay = document.createElement('div');
                overlay.className = 'bluroverlay';
                document.body.appendChild(overlay);
            }, 1000);
        };
    </script>
</body>
</html>
